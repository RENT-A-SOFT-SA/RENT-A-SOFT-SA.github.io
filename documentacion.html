<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Documentación | RENT-A-SOFT-SA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vendor/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="vendor/highlight.min.js"></script>
</head>

<body class="docs-body">
    <header class="docs-header">
        <div class="docs-brand">
            <span class="brand-accent"></span>
            <div>
                <p class="brand-label">RENT-A-SOFT-SA</p>
                <h1 class="brand-title">Centro de Documentación</h1>
            </div>
        </div>
        <nav class="docs-nav">
            <div class="theme-toggle" id="themeToggle" title="Cambiar tema">
                <span class="theme-toggle-icon sun">☀️</span>
                <div class="theme-toggle-switch"></div>
                <span class="theme-toggle-icon moon">🌙</span>
            </div>
            <a href="index.html">Inicio</a>
        </nav>
    </header>

    <main class="docs-layout">
        <aside class="docs-sidebar" aria-label="Listado de productos y APIs">
            <div class="sidebar-intro">
                <!-- <h2>Biblioteca técnica</h2>
                <p>Explora nuestras APIs organizadas por producto y accede a su documentación oficial.</p> -->
            </div>
            <div id="docs-catalog" class="catalog"></div>
            <div id="doc-toc" class="toc-container"></div>
        </aside>

        <section class="docs-viewer" aria-label="Visor de documentación">
            <div class="viewer-toolbar">
                <div>
                    <p class="viewer-label">Documento activo</p>
                    <h2 id="viewer-title">Selecciona una API para comenzar</h2>
                </div>
            </div>
            <div id="viewer-meta" class="viewer-meta"></div>
            <article id="doc-content" class="viewer-content">
                <p class="empty-state">Elige un elemento del listado para visualizar su documentación aquí.</p>
            </article>
        </section>
    </main>

    <footer class="docs-footer">
        <p>&copy; 2025 RENT-A-SOFT-SA. Documentación centralizada para equipos y partners.</p>
    </footer>

    <!-- Botón flotante scroll hacia arriba -->
    <button class="scroll-to-top" id="scrollToTop" title="Ir arriba">
        ↑
    </button>

    <script>
        // Funcionalidad del botón scroll hacia arriba
        const scrollToTopBtn = document.getElementById('scrollToTop');

        // Mostrar/ocultar botón según el scroll
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                scrollToTopBtn.classList.add('visible');
            } else {
                scrollToTopBtn.classList.remove('visible');
            }
        });

        // Scroll suave hacia arriba al hacer click
        scrollToTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // Funcionalidad del dark mode
        function initTheme() {
            // Verificar si hay un tema guardado en localStorage
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            // Usar tema guardado o preferencia del sistema
            const currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');
            
            // Aplicar tema al documento
            document.documentElement.setAttribute('data-theme', currentTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            // Cambiar tema en el documento
            document.documentElement.setAttribute('data-theme', newTheme);
            
            // Guardar en localStorage
            localStorage.setItem('theme', newTheme);
        }

        // Inicializar tema al cargar la página
        initTheme();

        // Event listener para el toggle de tema
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // Escuchar cambios en preferencias del sistema
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });
    </script>

    <script>
        const documentationCatalog = [
            {
                product: 'MrTurno',
                description: 'Gestion de turnos, usuarios, pacientes y notificaciones.',
                apis: [
                    {
                        id: 'mrturno-api-desarrolladores',
                        name: 'API de Desarrolladores MrTurno',
                        summary: 'Documentación completa con endpoints por módulo y flujos recomendados.',
                        format: 'md',
                        path: 'docs/mt_api_dev/mrturno-api-desarrolladores.md'
                    },
                    {
                        id: 'mrturno-notificaciones-multiples',
                        name: 'API Notificaciones Múltiples',
                        summary: 'Integración de recordatorios y confirmaciones de turnos.',
                        format: 'md',
                        path: 'docs/mt_api_dev/api-dev-notificaciones-multiples-mrturno.md'
                    },
                ]
            }
            // Para agregar un nuevo producto, agrega aquí una nueva entrada:
            // {
            //     product: 'Mi Nuevo Producto',
            //     description: 'Descripción del producto.',
            //     apis: [
            //         {
            //             id: 'mi-api-docs',
            //             name: 'Documentación de Mi API',
            //             summary: 'Guía completa para integrar Mi API.',
            //             format: 'md',
            //             path: 'docs/mi_producto/guia.md'
            //         }
            //     ]
            // }
        ];

        const catalogContainer = document.getElementById('docs-catalog');
        const viewerTitle = document.getElementById('viewer-title');
        const viewerMeta = document.getElementById('viewer-meta');
        const docContent = document.getElementById('doc-content');
        let activeButton = null;
        let tocScrollHandler = null;

        function createCatalog() {
            documentationCatalog.forEach(group => {
                const section = document.createElement('section');
                section.className = 'catalog-group';

                const header = document.createElement('header');
                header.className = 'catalog-group__header';
                header.innerHTML = `
                    <h3>${group.product}</h3>
                    <p>${group.description}</p>
                `;
                section.appendChild(header);

                const list = document.createElement('div');
                list.className = 'catalog-group__items';

                group.apis.forEach(api => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'catalog-item';
                    button.dataset.path = api.path;
                    button.dataset.format = api.format;
                    button.dataset.product = group.product;
                    button.dataset.name = api.name;
                    button.dataset.summary = api.summary;
                    button.dataset.id = api.id;
                    button.innerHTML = `
                        <span class="catalog-item__title">${api.name}</span>
                        <span class="catalog-item__summary">${api.summary}</span>
                        <span class="catalog-item__format">${api.format.toUpperCase()}</span>
                    `;
                    button.addEventListener('click', () => {
                        loadDocumentation(api, group.product, button);
                        updateQueryString(api.id);
                    });
                    list.appendChild(button);
                });

                section.appendChild(list);
                catalogContainer.appendChild(section);
            });
        }

        function updateQueryString(id) {
            const params = new URLSearchParams(window.location.search);
            params.set('doc', id);
            const query = params.toString();
            if (history.replaceState) {
                history.replaceState(null, '', `${window.location.pathname}?${query}`);
            }
        }

        function loadDocumentation(api, productName, buttonElement, isInitialLoad = false) {
            if (!isInitialLoad) {
                docContent.innerHTML = '<p class="loading">Cargando documentación…</p>';
            }
            // Limpiar TOC del documento anterior
            const tocEl = document.getElementById('doc-toc');
            tocEl.style.display = 'none';
            tocEl.innerHTML = '';
            if (tocScrollHandler) {
                window.removeEventListener('scroll', tocScrollHandler);
                tocScrollHandler = null;
            }
            viewerTitle.textContent = api.name;
            viewerMeta.innerHTML = `
                <span class="meta-item">${productName}</span>
                <span class="meta-item">Formato ${api.format.toUpperCase()}</span>
            `;

            fetch(api.path)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('No se pudo obtener el archivo solicitado.');
                    }
                    return response.text();
                })
                .then(rawContent => {
                    if (api.format === 'md' || api.path.endsWith('.md') || api.path.endsWith('.markdown')) {
                        docContent.innerHTML = marked.parse(rawContent);
                        styleEndpoints();
                        styleBlockquotes();
                        applyHighlighting();
                        addCopyButtons();
                        buildTOC();
                    } else {
                        const parser = new DOMParser();
                        const parsed = parser.parseFromString(rawContent, 'text/html');
                        docContent.innerHTML = parsed.body ? parsed.body.innerHTML : rawContent;
                    }
                })
                .catch(error => {
                    docContent.innerHTML = `<p class="error-state">${error.message}</p>`;
                });

            if (activeButton) {
                activeButton.classList.remove('catalog-item--active');
            }
            if (buttonElement) {
                buttonElement.classList.add('catalog-item--active');
                activeButton = buttonElement;
            }
        }

        const COPY_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        const CHECK_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

        function applyHighlighting() {
            docContent.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
        }

        function addCopyButtons() {
            docContent.querySelectorAll('pre').forEach(pre => {
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerHTML = COPY_ICON;
                btn.title = 'Copiar código';
                btn.addEventListener('click', () => {
                    const code = pre.querySelector('code');
                    const text = (code ? code.textContent : pre.textContent).trim();
                    navigator.clipboard.writeText(text).then(() => {
                        btn.innerHTML = CHECK_ICON;
                        btn.classList.add('copy-btn--success');
                        setTimeout(() => {
                            btn.innerHTML = COPY_ICON;
                            btn.classList.remove('copy-btn--success');
                        }, 2000);
                    }).catch(() => {
                        // Fallback para navegadores sin clipboard API
                        const ta = document.createElement('textarea');
                        ta.value = text;
                        ta.style.cssText = 'position:fixed;opacity:0';
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        btn.innerHTML = CHECK_ICON;
                        btn.classList.add('copy-btn--success');
                        setTimeout(() => {
                            btn.innerHTML = COPY_ICON;
                            btn.classList.remove('copy-btn--success');
                        }, 2000);
                    });
                });
                pre.appendChild(btn);
            });
        }

        function styleBlockquotes() {
            const WARNING_RE = /requiere[n]?|HTTP\s*200|success\s*=\s*false|debe[n]?|obligatorio|atenci[oó]n|importante/i;

            docContent.querySelectorAll('blockquote').forEach(bq => {
                const isWarning = WARNING_RE.test(bq.textContent);

                const icon = document.createElement('span');
                icon.className = 'callout-icon';
                icon.textContent = isWarning ? '⚠️' : 'ℹ️';

                bq.classList.add('callout', isWarning ? 'callout--warning' : 'callout--info');
                bq.prepend(icon);
            });
        }

        function styleEndpoints() {
            const METHODS = ['GET', 'POST', 'PUT', 'DELETE', 'PATCH'];
            const headings = Array.from(docContent.querySelectorAll('h3, h4'));

            headings.forEach(heading => {
                const codes = Array.from(heading.querySelectorAll('code'));
                let isEndpoint = false;

                codes.forEach(code => {
                    const text = code.textContent.trim();
                    const method = METHODS.find(m => text === m || text.startsWith(m + ' ') || text.startsWith(m + '/'));
                    if (!method) return;

                    isEndpoint = true;
                    const path = text.slice(method.length).trim();

                    const badge = document.createElement('span');
                    badge.className = 'http-badge http-badge--' + method.toLowerCase();
                    badge.textContent = method;

                    code.textContent = '';
                    code.classList.add('endpoint-code');
                    code.appendChild(badge);

                    if (path) {
                        const pathSpan = document.createElement('span');
                        pathSpan.className = 'http-path';
                        pathSpan.textContent = path;
                        code.appendChild(pathSpan);
                    }
                });

                if (isEndpoint) heading.classList.add('endpoint-heading');
            });
        }

        function slugify(text) {
            return text.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .trim()
                .replace(/\s+/g, '-') || 'section';
        }

        function buildTOC() {
            const tocEl = document.getElementById('doc-toc');
            const headings = Array.from(docContent.querySelectorAll('h2, h3'));

            if (headings.length < 2) {
                tocEl.style.display = 'none';
                return;
            }

            // Asegurar ID único en cada heading
            const used = {};
            headings.forEach(h => {
                if (!h.id) {
                    let base = slugify(h.textContent);
                    let id = base, n = 2;
                    while (used[id]) id = base + '-' + (n++);
                    h.id = id;
                }
                used[h.id] = true;
            });

            // Construir header del TOC
            const label = document.createElement('p');
            label.className = 'toc-header';
            label.textContent = 'En esta página';

            // Construir lista de links
            const nav = document.createElement('nav');
            nav.className = 'toc-list';
            nav.setAttribute('aria-label', 'Índice del documento');

            headings.forEach(h => {
                const a = document.createElement('a');
                a.href = '#' + h.id;
                a.className = 'toc-link toc-link--' + h.tagName.toLowerCase();
                a.textContent = h.textContent;
                a.addEventListener('click', e => {
                    e.preventDefault();
                    document.getElementById(h.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                nav.appendChild(a);
            });

            tocEl.innerHTML = '';
            tocEl.appendChild(label);
            tocEl.appendChild(nav);
            tocEl.style.display = 'block';

            // Resaltar sección activa según posición de scroll
            const links = Array.from(nav.querySelectorAll('.toc-link'));
            function updateActive() {
                const offset = 96;
                let active = headings[0];
                for (const h of headings) {
                    if (h.getBoundingClientRect().top <= offset) active = h;
                }
                links.forEach(l => l.classList.toggle(
                    'toc-link--active',
                    l.getAttribute('href') === '#' + active?.id
                ));
            }

            let ticking = false;
            tocScrollHandler = () => {
                if (!ticking) {
                    requestAnimationFrame(() => { updateActive(); ticking = false; });
                    ticking = true;
                }
            };
            window.addEventListener('scroll', tocScrollHandler, { passive: true });
            updateActive();
        }

        function findApiById(id) {
            for (const group of documentationCatalog) {
                for (const api of group.apis) {
                    if (api.id === id) {
                        return { api, product: group.product };
                    }
                }
            }
            return null;
        }

        function handleInitialLoad() {
            const params = new URLSearchParams(window.location.search);
            const docId = params.get('doc');
            if (docId) {
                const match = findApiById(docId);
                if (match) {
                    const button = document.querySelector(`.catalog-item[data-id="${docId}"]`);
                    loadDocumentation(match.api, match.product, button, true);
                    if (button) {
                        button.classList.add('catalog-item--active');
                        activeButton = button;
                    }
                }
            } else {
                const firstGroup = documentationCatalog[0];
                if (firstGroup && firstGroup.apis.length) {
                    const firstApi = firstGroup.apis[0];
                    const button = document.querySelector(`.catalog-item[data-id="${firstApi.id}"]`);
                    loadDocumentation(firstApi, firstGroup.product, button, true);
                    if (button) {
                        button.classList.add('catalog-item--active');
                        activeButton = button;
                    }
                    updateQueryString(firstApi.id);
                }
            }
        }

        createCatalog();
        handleInitialLoad();
    </script>
</body>

</html>
